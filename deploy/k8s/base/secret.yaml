apiVersion: v1
kind: Secret
metadata:
  name: labadia-secret
  namespace: labadia
type: Opaque
stringData:
  # Payload CMS secret — generate a long random string for production
  # Generate with: openssl rand -base64 48
  PAYLOAD_SECRET: "replace-with-a-long-random-string"

  # SQLite database connection string
  # The file path must match the PVC mount path
  DATABASE_URL: "file:./data/badia.db"

  # SMTP — email notifications for contact form leads
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "user@example.com"
  SMTP_PASS: "your-password"
  SMTP_FROM: '"La Badia" <noreply@labadia.it>'
  NOTIFY_EMAIL: "owner@labadia.it"